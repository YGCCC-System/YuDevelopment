<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Option 04 — unit number color</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,ital,wght@6..72,0,500;6..72,0,600;6..72,1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper-2:#E5E2D8; --ink:#14161A; --ink-2:#2F3238; --ink-3:#61656D;
    --rule:#E3E1DA; --accent:#1F3A5C; --gray:#A8ABB0; --dgray:#2E3236;
    --sans:"Geist",ui-sans-serif,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --mono:"Geist Mono",ui-monospace,Menlo,monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ background:#fff; color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }

  .pagehead{ max-width:1280px; margin:0 auto; padding:clamp(40px,6vw,80px) clamp(28px,5vw,72px) clamp(8px,2vw,20px); }
  .pagehead .eyebrow{ font-family:var(--mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); }
  .pagehead h1{ margin:16px 0 0; font-weight:600; font-size:clamp(26px,3.4vw,40px); letter-spacing:-.022em; }
  .pagehead p{ margin:14px 0 0; max-width:60ch; color:var(--ink-2); font-size:16px; line-height:1.6; }

  .sheet{ max-width:1280px; margin:0 auto; padding:0 clamp(28px,5vw,72px) clamp(80px,10vw,140px); }
  .opt{ padding:clamp(32px,4vw,52px) 0; border-top:1px solid var(--rule); }
  .opt:first-child{ border-top:none; }
  .opt-h{ display:flex; align-items:baseline; gap:14px; margin-bottom:clamp(22px,2.6vw,32px); }
  .opt-h .sw{ width:12px; height:12px; border-radius:50%; align-self:center; }
  .opt-h .ttl{ font-weight:600; font-size:18px; letter-spacing:-.01em; }
  .opt-h .desc{ color:var(--ink-3); font-size:14px; font-family:var(--mono); }

  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(20px,2.2vw,32px); }
  .grid .c{ display:block; text-decoration:none; color:inherit; }
  .grid .c:first-child{ grid-column:1 / -1; }
  .ph{ position:relative; width:100%; aspect-ratio:3/2; overflow:hidden; background:var(--paper-2); }
  .grid .c:first-child .ph{ aspect-ratio:21/9; }
  .ph img{ width:100%; height:100%; object-fit:cover; display:block; }

  .m{ margin-top:16px; display:flex; align-items:center; gap:18px; }
  .num{ font-family:var(--mono); font-weight:500; font-size:34px; line-height:1; letter-spacing:-.02em; }
  .num small{ display:block; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); margin-top:6px; }
  .txt .name{ display:block; font-weight:600; font-size:17px; letter-spacing:-.01em; }
  .txt .loc{ display:block; margin-top:3px; font-size:15px; color:var(--ink-3); }

  .blue .num{ color:var(--accent); }
  .black .num{ color:var(--ink); }
  .gray .num{ color:var(--gray); }
  .dgray .num{ color:var(--dgray); }

  @media (max-width:880px){
    .grid{ grid-template-columns:1fr; }
    .grid .c:first-child{ grid-column:auto; }
    .grid .c:first-child .ph{ aspect-ratio:3/2; }
  }
</style>
</head>
<body>
  <header class="pagehead">
    <div class="eyebrow">Option 04 — display number left</div>
    <h1>Unit number color — blue · black · light gray</h1>
    <p>Same layout, on white. Only the large mono unit figure changes color.</p>
  </header>
  <main class="sheet" id="sheet"></main>

  <script>
    const projects = [
      { img:"../media/project-douglas.png",     name:"Platform Douglas",     n:126, loc:"Douglas, GA" },
      { img:"../media/project-flint-river.png",  name:"Platform Flint River", n:192, loc:"Bainbridge, GA" },
      { img:"../media/project-dothan.png",       name:"Platform Dothan",      n:208, loc:"Dothan, AL" },
      { img:"../media/project-americus.png",     name:"Platform Americus",    n:80,  loc:"Americus, GA" },
    ];
    const variants = [
      { mod:"blue",  ttl:"Blue (accent)",  desc:"--accent #1F3A5C", sw:"#1F3A5C" },
      { mod:"black", ttl:"Black",          desc:"--ink #14161A",    sw:"#14161A" },
      { mod:"gray",  ttl:"Light gray",     desc:"--gray #A8ABB0",   sw:"#A8ABB0" },
      { mod:"dgray", ttl:"Dark gray",      desc:"#2E3236 (≈ navy depth)", sw:"#2E3236" },
    ];
    document.getElementById("sheet").innerHTML = variants.map(v=>{
      const cards = projects.map(p=>`
        <a class="c" href="#" aria-label="${p.name}">
          <div class="ph"><img src="${p.img}" alt="${p.name}" loading="lazy" /></div>
          <div class="m">
            <span class="num">${p.n}<small>units</small></span>
            <span class="txt"><span class="name">${p.name}</span><span class="loc">${p.loc}</span></span>
          </div>
        </a>`).join("");
      return `<section class="opt ${v.mod}">
        <div class="opt-h"><span class="sw" style="background:${v.sw}"></span><span class="ttl">${v.ttl}</span><span class="desc">${v.desc}</span></div>
        <div class="grid">${cards}</div>
      </section>`;
    }).join("");
  </script>
</body>
</html>
